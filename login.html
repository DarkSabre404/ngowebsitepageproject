<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account | Still Rooted</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <span class="logo">🌱 Still Rooted</span>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="team.html">Our Team</a></li>
                <li><a href="login.html" class="active">Login / Signup</a></li>
            </ul>
        </div>
    </nav>

    <main class="content-area">
        <div class="auth-card">

            <div class="auth-tabs">
                <button type="button" id="tab-login" class="auth-tab active">Log In</button>
                <button type="button" id="tab-signup" class="auth-tab">Sign Up</button>
            </div>

            <div class="auth-body">
                <h2 id="auth-title">Welcome Back</h2>
                <p id="auth-subtitle">Log in to manage your events and workshops.</p>

                <form id="auth-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="name@example.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" id="submit-btn">Log In</button>
                </form>

                <p id="message-box" class="message-box"></p>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
